- hosts: all
  become: true 
  vars:
    KUBECONFIG: /etc/rancher/k3s/k3s.yaml
    LONGHORN_VERSION: v1.11.0
    LONGHORN_V2_ENGINE: true
    HUGEPAGES_COUNT: 1024
    ROOK_VERSION: v1.19.2
    NFS_CSI_VERSION: v4.13.1
    NFS_MOUNT_POINT: /srv/nfs/
    NFS_EXTRA_DISK: /dev/vdb # set empty to skip
    NFS_FS_TYPE: ext4
  roles:
    - role: csi
      vars:
        apps_enabled:
          # choose one
          # - longhorn
          - rook-ceph
          # - nfs
