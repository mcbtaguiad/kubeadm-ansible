---
# tasks file for csi-longhorn
# ============================================================================ #
- name: Install storage dependecies
  package:
    name: "{{ item }}"
    state: present
    # update_cache: yes
  with_items:
  - device-mapper-persistent-data
  - iscsi-initiator-utils
  - cryptsetup
  - nfs-utils
  - lvm2
  - jq
  when: ansible_facts['os_family'] == 'RedHat'
- name: Install storage dependecies
  package:
    name: "{{ item }}"
    state: present
    # update_cache: yes
  with_items:
  - open-iscsi
  - ufw
  when: ansible_facts['os_family'] == 'Debian'
# ============================================================================ #
- name: Specify and load the following kernel module dependencies
  shell: |-
    echo "InitiatorName=$(/sbin/iscsi-iname)" > /etc/iscsi/initiatorname.iscsi
  when: ansible_facts['os_family'] == 'RedHat'
# ============================================================================ #
- name: Enable kernel module iscsi_tcp
  community.general.modprobe:
    name: "{{ item }}"
    state: present
  with_items:
  - iscsi_tcp
  - rbd
# ============================================================================ #
- name: Ensure iscsi is started
  systemd:
    name: "{{ item }}"
    state: started
    enabled: true
  with_items:
  - iscsi
  when: ansible_facts['os_family'] == 'RedHat'
# ============================================================================ #
- name: Ensure iscsi is started
  systemd:
    name: "{{ item }}"
    state: started
    enabled: true
  with_items:
  - iscsi
  - ufw
  when: ansible_facts['os_family'] == 'Debian'
# ============================================================================ #
- name: Deploy Longhorn
  kubernetes.core.k8s:
    state: present
    src: https://raw.githubusercontent.com/longhorn/longhorn/{{ LONGHORN_VERSION }}/deploy/longhorn.yaml
    kubeconfig: "{{ KUBECONFIG }}"
  run_once: true
  delegate_to: "{{ groups['master'][0] }}"
