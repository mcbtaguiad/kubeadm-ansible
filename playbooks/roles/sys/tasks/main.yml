---
# tasks file for env
- name: Create dir paths
  become: true
  file:
    path: "{{ item }}"
    state: directory
    owner: root
    group: root
    mode: a-rwx,a+rx
  with_items:
  - /opt/cni/bin
  - /var/lib/kubelet
  - /ansible/k8s
# ============================================================================ #
- name: Add IP address of all hosts to all hosts
  lineinfile:
    dest: /etc/hosts
    regexp: '.*{{ item }}$'
    line: "{{ hostvars[item].ansible_host }} {{ hostvars[item].ansible_facts.hostname }}"
    state: present
  #when: hostvars[item].ansible_host is defined
  with_items: "{{ groups.all }}"
# ============================================================================ #
- name: Make sure EPEL repo is installed
  yum:
    name: epel-release
    state: present
  when: ansible_facts['os_family'] == 'RedHat'
# ============================================================================ #
- name: Install prerequisite packages 
  package:
    name: "{{ item }}"
    state: present
    # update_cache: yes
  with_items:
  - ca-certificates
  - curl
  - yum-utils
  - git
  - python3-kubernetes
  when: ansible_facts['os_family'] == 'RedHat'

- name: Install prerequisite packages 
  ansible.builtin.apt:
    name: "{{ item }}"
    state: present
    # update_cache: yes
  with_items:
  - apt-transport-https 
  - ca-certificates 
  - curl 
  - gpg
  - git
  - python3-kubernetes
  when: ansible_facts['os_family'] == 'Debian'
# ============================================================================ #
- name: Specify and load the following kernel module dependencies
  shell: |-
    cat <<EOF | tee /etc/modules-load.d/containerd.conf
    overlay
    br_netfilter
    EOF
# ============================================================================ #
- name: Set sysctl k8s config
  copy:
    dest: "/etc/sysctl.d/99-kubernetes-cri.conf"
    content: |
      net.bridge.bridge-nf-call-iptables = 1
      net.ipv4.ip_forward = 1
      net.bridge.bridge-nf-call-ip6tables = 1
# ============================================================================ #
- name: Reload syscctl
  shell: sysctl --system
# ============================================================================ #
- name: Disable swap for RedHat
  block:
    - ansible.builtin.command: swapoff -a
    - ansible.builtin.replace:
        path: /etc/fstab
        regexp: '^\s*(\S+)\s+(\S+)\s+swap\s+'
        replace: '# \1 \2 swap '
  when:
    - ansible_facts['os_family'] == 'RedHat'
    - ansible_facts.swaptotal_mb | int > 0

- name: Disable swap for Debian
  block:
    - ansible.builtin.command: swapoff -a
    - ansible.builtin.replace:
        path: /etc/fstab
        regexp: '^\s*(\S+)\s+(\S+)\s+swap\s+'
        replace: '# \1 \2 swap '
  when:
    - ansible_facts['os_family'] == 'Debian'
    - ansible_facts.swaptotal_mb | int > 0
# ============================================================================ #
- name: Gather package facts
  ansible.builtin.package_facts:
    manager: auto
# ============================================================================ #
- name: Open firewall ports (firewalld)
  ansible.posix.firewalld:
    permanent: yes
    immediate: yes
    port: "{{ item.port }}/{{ item.proto }}"
    state: enabled
    zone: public
  loop:
    - { port: 2379, proto: tcp }        # etcd client
    - { port: 2380, proto: tcp }        # etcd peer
    - { port: 8090-8091, proto: tcp }   # platform agent
    - { port: 8472, proto: udp }        # VXLAN backend
    - { port: 6443, proto: tcp }        # kube-apiserver
    - { port: 10250-10259, proto: tcp } # kubelet
    - { port: 30000-32767, proto: tcp } # nodeport
    - { port: 179, proto: tcp }         # calico BGP
    - { port: 4789, proto: udp }        # calico VXLAN
    - { port: 111, proto: udp }         # nfs
    - { port: 111, proto: tcp }         # rpcbind
    - { port: 2049, proto: udp }        # nfs
  when:
    - ansible_facts['os_family'] == 'RedHat'
    - "'firewalld' in ansible_facts.packages"
  ignore_errors: yes
# ============================================================================ #
- name: Open firewall ports (ufw)
  community.general.ufw:
    rule: allow
    proto: "{{ item.proto }}"
    port: "{{ item.port }}"
  loop:
    - { port: 2379, proto: tcp }
    - { port: 2380, proto: tcp }
    - { port: 8090:8091, proto: tcp }
    - { port: 8472, proto: udp }
    - { port: 6443, proto: tcp }
    - { port: 10250:10259, proto: tcp }
    - { port: 30000:32767, proto: tcp }
    - { port: 179, proto: tcp }
    - { port: 4789, proto: udp }
    - { port: 5473, proto: tcp }
    - { port: 111, proto: udp }
    - { port: 111, proto: tcp }
    - { port: 2049, proto: udp }
  when:
    - ansible_facts['os_family'] == 'Debian'
    - "'ufw' in ansible_facts.packages"
  ignore_errors: yes
