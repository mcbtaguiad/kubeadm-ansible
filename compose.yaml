services:
  ansible-kubeadm:
      container_name: ansible-kubeadm
      image: docker.io/mcbtaguiad/kubeadm-ansible:2.0.0
      build:
          context: .
          dockerfile: ./docker/Dockerfile
      # entrypoint: tail -f /dev/null
      restart: always
      volumes:
      - "./:/ansible"
      - "~/.ssh/:/root/.ssh"
